server {
    root /var/www/urt/public;

    # Определяем реальный протокол из заголовка X-Forwarded-Proto
    # Если заголовок есть - используем его, если нет - берем $scheme
    set $real_scheme $http_x_forwarded_proto;
    if ($real_scheme = "") {
        set $real_scheme $scheme;
    }

    # Определяем, HTTPS ли это
    set $fastcgi_https off;
    if ($real_scheme = "https") {
        set $fastcgi_https on;
    }

    #

    location / {
        try_files $uri /index.php?$query_string;
        # kill cache
        add_header Last-Modified $date_gmt;
        add_header Cache-Control 'no-store, no-cache';
        if_modified_since off;
        expires off;
        etag off;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Передаем реальный протокол в PHP
        fastcgi_param HTTPS $fastcgi_https;
        fastcgi_param HTTP_X_FORWARDED_PROTO $real_scheme;
        fastcgi_param SERVER_PORT $real_scheme;

        # Передаем оригинальный host
        fastcgi_param HTTP_HOST $host;

        # Добавляем реальный протокол в REQUEST_SCHEME
        fastcgi_param REQUEST_SCHEME $real_scheme;
    }

    # Статические файлы
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

